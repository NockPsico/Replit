kind = "web"
previewPath = "/"
title = "Latop Cálculo"
version = "1.0.0"
id = "artifacts/latop-calculo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21415

[services.development]
run = "pnpm --filter @workspace/latop-calculo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/latop-calculo", "run", "build" ]
publicDir = "artifacts/latop-calculo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21415"
BASE_PATH = "/"
